    <style>
      :root {
        color-scheme: light;
        --page-bg: #f6f1ea;
        --shadow: 0 20px 60px rgba(62, 50, 37, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.5), transparent 28%, transparent 72%, rgba(255, 255, 255, 0.5)),
          var(--page-bg);
        color: #1d1d1f;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .page {
        width: min(100%, 1200px);
        margin: 0 auto;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .section {
        margin: 0;
        line-height: 0;
      }

      .section img {
        display: block;
        width: 100%;
        height: auto;
      }

      .hero-section {
        position: relative;
      }

      .shop-now-hotspot,
      .notify-hotspot {
        position: absolute;
        border: 0;
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
      }

      .shop-now-hotspot {
        left: 36.5%;
        top: 84.8%;
        width: 27%;
        height: 6.5%;
      }

      .notify-hotspot {
        left: 11.5%;
        top: 68%;
        width: 77%;
        height: 11%;
      }

      .shop-now-hotspot:focus-visible,
      .notify-hotspot:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 4px;
        box-shadow: 0 0 0 6px rgba(245, 48, 164, 0.75);
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 22px;
      }

      .modal[hidden] {
        display: none;
      }

      .modal__scrim {
        position: absolute;
        inset: 0;
        background: rgba(16, 20, 31, 0.62);
        backdrop-filter: blur(8px);
      }

      .modal__panel {
        position: relative;
        z-index: 1;
        width: min(100%, 760px);
      }

      .modal__close {
        position: absolute;
        top: -14px;
        right: -14px;
        z-index: 2;
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 999px;
        background: #171717;
        color: #fff;
        cursor: pointer;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }

      .modal__close:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }

      .stock-card {
        position: relative;
        line-height: 0;
      }

      .stock-card img {
        display: block;
        width: 100%;
        height: auto;
      }

      .notify-card {
        overflow: hidden;
        border-radius: 26px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(14, 20, 34, 0.28);
      }

      .notify-card__header {
        padding: 42px 44px 26px;
        border-bottom: 1px solid #f0edf3;
      }

      .notify-card__title {
        margin: 0 0 12px;
        color: #24242a;
        font-size: 30px;
        line-height: 1.15;
        font-weight: 760;
      }

      .notify-card__helper {
        margin: 0;
        color: #686873;
        font-size: 17px;
        line-height: 1.55;
      }

      .notify-form {
        display: grid;
        gap: 16px;
        padding: 30px 44px 42px;
      }

      .notify-form__label {
        color: #34343b;
        font-size: 14px;
        font-weight: 700;
      }

      .notify-form__input {
        width: 100%;
        min-height: 54px;
        border: 1px solid #ded9e2;
        border-radius: 8px;
        padding: 0 16px;
        color: #202026;
        font: inherit;
      }

      .notify-form__input:focus {
        border-color: #f530a4;
        outline: 3px solid rgba(245, 48, 164, 0.18);
      }

      .notify-form__button {
        min-height: 56px;
        border: 0;
        border-radius: 999px;
        background: #f530a4;
        color: #fff;
        font: inherit;
        font-size: 18px;
        font-weight: 800;
        cursor: pointer;
      }

      .notify-form__button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .notify-form__status {
        min-height: 24px;
        margin: 0;
        color: #686873;
        font-size: 15px;
        line-height: 1.45;
      }

      .notify-form__status.is-error {
        color: #b3261e;
      }

      .notify-form__status.is-success {
        color: #146c43;
      }

      .honeypot {
        position: absolute;
        left: -10000px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .top-link {
        position: fixed;
        right: max(16px, calc((100vw - 1200px) / 2 + 18px));
        bottom: 18px;
        z-index: 10;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: rgba(32, 30, 28, 0.78);
        color: #fff;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
      }

      .top-link:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }

      .top-link svg {
        width: 21px;
        height: 21px;
      }

      @media (max-width: 760px) {
        body {
          background: #fff;
        }

        .page {
          box-shadow: none;
        }

        .top-link {
          right: 12px;
          bottom: 12px;
          width: 40px;
          height: 40px;
        }

        .modal {
          padding: 14px;
        }

        .modal__close {
          top: 8px;
          right: 8px;
        }

        .notify-card {
          border-radius: 18px;
        }

        .notify-card__header {
          padding: 30px 22px 20px;
        }

        .notify-card__title {
          font-size: 24px;
        }

        .notify-card__helper {
          font-size: 15px;
        }

        .notify-form {
          padding: 24px 22px 30px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
    </style>

    >

        class="modal__scrim"
        type="button"
        aria-label="Close notification form"
        data-close-modal
      ></button>

            <path
              d="m6.7 5.3 5.3 5.3 5.3-5.3 1.4 1.4-5.3 5.3 5.3 5.3-1.4 1.4-5.3-5.3-5.3 5.3-1.4-1.4 5.3-5.3-5.3-5.3 1.4-1.4Z"

            </p>

              name="email"

              inputmode="email"
              required
              placeholder="you@example.com"
            />
            <label class="honeypot" for="notify-website">Website</label>

              class="honeypot"
              id="notify-website"
              name="website"
              type="text"
              tabindex="-1"
              autocomplete="off"
            />
            <button class="notify-form__button" type="submit">Notify me</button>
            <p class="notify-form__status" id="notify-status" aria-live="polite"></p>
          </form>
        </section>

    <script>
      const NOTIFY_ENDPOINT = "https://script.google.com/macros/s/AKfycbwRnPadrClhGrvjt_Qk2vpkBrbchx_p1_l6y2UQofEnx2jWntmcMm0CHvD3CXPuXwv5/exec";

      const stockModal = document.querySelector("#stock-modal");
      const notifyModal = document.querySelector("#notify-modal");
      const notifyForm = document.querySelector("#notify-form");
      const notifyEmail = document.querySelector("#notify-email");
      const notifyStatus = document.querySelector("#notify-status");
      let lastFocusedElement = null;

      function openModal(modal, options = {}) {
        if (!options.keepPreviousFocus) {
          lastFocusedElement = document.activeElement;
        }
        modal.hidden = false;
        document.body.style.overflow = "hidden";
        const firstControl = modal.querySelector(".modal__close, input, button");
        firstControl?.focus();
      }

      function closeModals() {
        stockModal.hidden = true;
        notifyModal.hidden = true;
        document.body.style.overflow = "";
        if (lastFocusedElement instanceof HTMLElement) {
          lastFocusedElement.focus();
        }
      }

      function showStatus(message, type) {
        notifyStatus.textContent = message;
        notifyStatus.classList.toggle("is-error", type === "error");
        notifyStatus.classList.toggle("is-success", type === "success");
      }

      document.querySelector("[data-open-stock]").addEventListener("click", () => {
        openModal(stockModal);
      });

      document.querySelector("[data-open-notify]").addEventListener("click", () => {
        stockModal.hidden = true;
        openModal(notifyModal, { keepPreviousFocus: true });
        showStatus("", "");
      });

      document.querySelectorAll("[data-close-modal]").forEach((control) => {
        control.addEventListener("click", closeModals);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && (!stockModal.hidden || !notifyModal.hidden)) {
          closeModals();
        }
      });

      notifyForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!notifyForm.reportValidity()) {
          return;
        }

        if (!NOTIFY_ENDPOINT) {
          showStatus("Signup is being prepared. Please try again later.", "error");
          return;
        }

        const formData = new FormData(notifyForm);
        if (formData.get("website")) {
          showStatus("Thank you. We’ll notify you when it’s available.", "success");
          notifyForm.reset();
          return;
        }

        formData.append("source", "nesobio-out-of-stock");
        formData.append("pageUrl", window.location.href);
        formData.append("userAgent", navigator.userAgent);

        const submitButton = notifyForm.querySelector("button[type='submit']");
        submitButton.disabled = true;
        showStatus("Submitting...", "");

        try {
          await fetch(NOTIFY_ENDPOINT, {
            method: "POST",
            mode: "no-cors",
            body: formData,
          });
          showStatus("Thank you. We’ll notify you when it’s available.", "success");
          notifyForm.reset();
        } catch (error) {
          showStatus("Something went wrong. Please try again later.", "error");
        } finally {
          submitButton.disabled = false;
          notifyEmail.focus();
        }
      });
    </script>
